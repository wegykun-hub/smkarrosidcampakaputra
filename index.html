<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <!-- Viewport: locks scale, prevents iOS bounce navigation -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- PWA / Mobile App Mode -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SMK Ar Rosyid" />
    <meta name="theme-color" content="#1e293b" />
    <!-- SEO -->
    <meta name="description" content="Website Resmi SMK Ar Rosyid Campaka Putra - Pendaftaran SPMB, E-Learning, Absensi Digital" />
    <title>SMK AR ROSYID CAMPAKA PUTRA</title>
    <style>
      /* Core: prevent horizontal overflow and swipe navigation */
      *, *::before, *::after {
        box-sizing: border-box;
      }
      html {
        overscroll-behavior: none;
        overflow-x: hidden;
      }
      body {
        overscroll-behavior: none;
        overflow-x: hidden;
        min-height: 100vh;
        margin: 0;
        padding: 0;
      }
      #root {
        overflow-x: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
